[project]
name = "atrace"
version = "0.1.7"
description = "Generate trace tables for programs"
readme = "README.md"
authors = [{ name = "Nicholas Wolff", email = "nwolff@gmail.com" }]
requires-python = ">=3.10"
dependencies = ["tabulate>=0.9.0"]

[project.urls]
Repository = "https://github.com/nwolff/atrace.git"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "mypy>=1.19.1",
    "pytest>=9.0.2",
    "ruff>=0.14.14",
    "types-tabulate>=0.9.0.20241207",
]

[tool.uv.workspace]
members = ["src/examples"]
